<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta | UrlShortener</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card auth-card p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">UrlShortener</h2>
            <p class="text-muted">Crie sua conta gratuita</p>
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" placeholder="exemplo@email.com">
        </div>
        <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="••••••••">
            <small class="text-muted">Mínimo 6 caracteres, 1 maiúscula e 1 símbolo.</small>
        </div>

        <button onclick="registrar()" class="btn btn-primary w-100 mb-3">Criar Conta</button>

        <p class="text-center small">
            Já tem uma conta? <a href="/login" class="text-primary text-decoration-none fw-bold">Faça login</a>
        </p>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
