<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Dashboard | UrlShortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">UrlShortener App 🚀</span>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0 p-4 mb-4">
            <h5 class="text-secondary mb-3">Novo Link</h5>
            <div class="input-group">
                <input type="text" id="urlInput" class="form-control" placeholder="Cole sua URL longa aqui...">
                <button onclick="encurtar()" class="btn btn-primary">Encurtar Agora</button>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="input-group style="max-width: 300px;">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscaInput" class="form-control" placeholder="Pesquisar links..." onkeyup="filtrarTabela()">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="tabelaLinks">
                </table>
            </div>
        </div>
        </br>
        <div class="card shadow-sm border-0 p-4">
            <h5 class="text-secondary mb-3">Meus Links Encurtados</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>URL Original</th>
                            <th>Link Curto (Copiar/Acessar)</th>
                            <th>Cliques</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
